<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Purely:SOOM · 의사 대시보드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--g7:#2F8A3E;--g5:#5BC23B;--g1:#E5F8D0;--g0:#F2FBE6;--ink:#0F2A1E;--i2:#3F5A50;--i3:#8A9E94;--i4:#C6D0CB;--ln:#E4EFE6;--bg:#F4F7F5;--wa:#F2A93B;--wb:#FFF4DC;--da:#E65A4A;--db:#FFE6E1;--lb:#7FB8D9;--sh:0 1px 2px rgba(15,42,30,.04),0 2px 8px rgba(15,42,30,.04);}
html,body{height:100%;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--ink);}
button{font-family:inherit;}
.av{width:36px;height:36px;border-radius:999px;background:linear-gradient(135deg,var(--lb),#A5E66B);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;}
.ch{display:inline-flex;align-items:center;height:24px;padding:0 9px;background:var(--g1);color:var(--g7);border-radius:999px;font-size:11px;font-weight:700;}
.tp{transition:transform .12s;cursor:pointer;}.tp:active{transform:scale(.97);}
.fd{animation:fu .25s cubic-bezier(.2,.7,.3,1) both;}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.mb{position:fixed;inset:0;background:rgba(15,42,30,.45);z-index:200;display:flex;align-items:center;justify-content:center;}
.mo{background:white;border-radius:24px;padding:28px;width:480px;max-height:85vh;overflow-y:auto;box-shadow:0 24px 60px rgba(15,42,30,.2);}
input,textarea,select{font-family:inherit;font-size:14px;border:1.5px solid var(--ln);border-radius:12px;padding:10px 14px;outline:none;width:100%;color:var(--ink);background:white;transition:border-color .15s;}
input:focus,textarea:focus,select:focus{border-color:var(--g5);}
textarea{resize:vertical;min-height:80px;}
.sc::-webkit-scrollbar{width:4px;}.sc::-webkit-scrollbar-thumb{background:var(--ln);border-radius:999px;}
label{display:block;font-size:11px;font-weight:800;color:var(--i3);margin-bottom:6px;}

/* 모바일 반응형 */
@media (max-width: 768px) {
  .mo{width:calc(100vw - 32px);max-width:480px;padding:20px;}
}
@media (max-width: 900px) {
  /* 모바일: 가로 스크롤로 데스크탑 레이아웃 보여주기 */
  body { overflow-x: auto; min-width: 1100px; }
  #root { min-width: 1100px; }
  /* 데스크탑 권장 안내 */
  .mobile-notice {
    display: block !important;
  }
}
.mobile-notice {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: linear-gradient(135deg, #FFB930, #FF8A3D);
  color: white;
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 700;
  text-align: center;
  z-index: 9999;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
</style>
</head>
<body>
<div class="mobile-notice">💻 의사 대시보드는 데스크탑에 최적화 · 좌우 스크롤로 확인하세요</div>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script type="text/babel">
const {useState,useMemo}=React;
function Ic({name,size=18,color='currentColor',sw=1.8}){
  const p={width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:color,strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round'};
  if(name==='user')return <svg {...p}><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 4-6 8-6s7 2 8 6"/></svg>;
  if(name==='note')return <svg {...p}><path d="M5 4a2 2 0 0 1 2-2h7l5 5v13a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4Z"/><path d="M14 2v5h5M9 13h6M9 17h4"/></svg>;
  if(name==='pulse')return <svg {...p}><path d="M3 12h4l2-6 4 12 2-6h6"/></svg>;
  if(name==='bell')return <svg {...p}><path d="M6 8a6 6 0 0 1 12 0c0 7 2 8 2 8H4s2-1 2-8ZM10 20a2 2 0 0 0 4 0"/></svg>;
  if(name==='gift')return <svg {...p}><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M3 13h18M12 8v13M12 8s-3-5-6-3 2 3 6 3ZM12 8s3-5 6-3-2 3-6 3Z"/></svg>;
  if(name==='search')return <svg {...p}><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>;
  if(name==='flame')return <svg {...p}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14-.22-4.05 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.29 1-3a2.5 2.5 0 0 0 2.5 2.5Z"/></svg>;
  if(name==='co')return <svg {...p}><circle cx="8" cy="12" r="4"/><circle cx="16" cy="12" r="4"/></svg>;
  if(name==='bolt')return <svg {...p}><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/></svg>;
  if(name==='check')return <svg {...p}><path d="M5 12.5 10 17l9-10"/></svg>;
  if(name==='close')return <svg {...p}><path d="M6 6l12 12M18 6 6 18"/></svg>;
  if(name==='plus')return <svg {...p}><path d="M12 5v14M5 12h14"/></svg>;
  if(name==='filter')return <svg {...p}><path d="M4 5h16l-6 8v6l-4-2v-4Z"/></svg>;
  if(name==='warning')return <svg {...p}><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
  if(name==='home')return <svg {...p}><path d="M3 10.5 12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1Z"/></svg>;
  if(name==='arr')return <svg {...p}><path d="M5 12h14M13 5l7 7-7 7"/></svg>;
  return null;
}
const PTS=[
  {id:'p1',nm:'김민준',age:28,sex:'남',tp:'스트레스 해소형',   sk:27,last:'오늘 09:12',co:3, rk:'low', bd:[42,31,27,0,0]},
  {id:'p2',nm:'박지우',age:31,sex:'여',tp:'습관 반복형',      sk:41,last:'오늘 08:45',co:2, rk:'low', bd:[18,52,16,14,0]},
  {id:'p3',nm:'이서연',age:24,sex:'여',tp:'사회적 영향형',    sk:5, last:'어제 22:30',co:9, rk:'high',bd:[22,12,18,48,0]},
  {id:'p4',nm:'최도윤',age:29,sex:'남',tp:'부정적 해석형',    sk:12,last:'오늘 10:01',co:6, rk:'med', bd:[28,20,12,8,32]},
  {id:'p5',nm:'정하준',age:22,sex:'남',tp:'자기효능감 부족형',sk:18,last:'오늘 07:55',co:4, rk:'low', bd:[16,22,38,24,0]},
  {id:'p6',nm:'윤예린',age:33,sex:'여',tp:'습관 반복형',      sk:0, last:'3일 전',    co:14,rk:'high',bd:[20,48,22,10,0]},
];
const TC=['#5BC23B','#A5E66B','#7FB8D9','#FFB930','#A89BF5'];
const TL=['스트레스 해소','습관 반복','휴식 확보','사회적 영향','부정적 해석'];
function gCO(rk,co){return Array.from({length:28},(_,i)=>{const t=i/27;const b=rk==='low'?(co+10)*(1-t)+co*t:rk==='high'?Math.max(1,co-4+4*t):co;return Math.max(1,+(b+Math.sin(i*1.2)*1.5).toFixed(1));});}
const NAV=[{id:'patients',ic:'user',lb:'환자',bd:String(PTS.length)},{id:'notes',ic:'note',lb:'진료 노트'},{id:'co-stats',ic:'pulse',lb:'CO 통계'},{id:'alerts',ic:'bell',lb:'알림',bd:'3'},{id:'prescriptions',ic:'gift',lb:'처방'}];
function App(){
  const[pg,setPg]=useState('patients');
  const[sid,setSid]=useState('p1');
  const[q,setQ]=useState('');
  const[rxM,setRxM]=useState(false);
  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 24px',height:52,borderBottom:'1px solid var(--ln)',background:'white',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <img src="assets/logo.png" alt="logo" style={{height:30}}/>
          <div><div style={{fontSize:13,fontWeight:800}}>의사 대시보드</div><div style={{fontSize:10,color:'var(--i3)',fontWeight:600}}>환자 패널 · CO 추이 · 트리거 로그 · CBT 진척</div></div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:11,fontWeight:700,color:'var(--i3)',letterSpacing:'.08em'}}>PROTOTYPE</span>
          <a href="share-patient.html" style={{display:'inline-flex',alignItems:'center',gap:6,height:34,padding:'0 14px',background:'var(--g5)',color:'white',borderRadius:999,fontSize:12,fontWeight:700,textDecoration:'none'}}>환자 앱 보기 <Ic name="arr" size={13} color="white"/></a>
        </div>
      </div>
      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        <aside style={{width:210,background:'white',borderRight:'1px solid var(--ln)',padding:'14px 10px',display:'flex',flexDirection:'column',flexShrink:0}}>
          {NAV.map(it=>{const on=pg===it.id;return(
            <button key={it.id} onClick={()=>setPg(it.id)} className="tp" style={{display:'flex',alignItems:'center',gap:10,height:42,padding:'0 12px',borderRadius:12,background:on?'var(--g0)':'transparent',color:on?'var(--g7)':'var(--i2)',border:'none',fontWeight:700,fontSize:13,textAlign:'left',marginBottom:2}}>
              <Ic name={it.ic} size={16} color={on?'var(--g7)':'var(--i3)'}/><span style={{flex:1}}>{it.lb}</span>
              {it.bd&&<span style={{background:on?'var(--g5)':'var(--i4)',color:'white',fontSize:10,fontWeight:800,padding:'2px 7px',borderRadius:999}}>{it.bd}</span>}
            </button>
          );})}
          <div style={{flex:1}}/>
          <div style={{background:'var(--g0)',borderRadius:12,padding:'10px 12px',marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:800,color:'var(--g7)'}}>박재훈 전문의</div>
            <div style={{fontSize:10,color:'var(--i2)',marginTop:2}}>호흡기내과 · 서울대학교병원</div>
          </div>
          <a href="index.html" style={{display:'flex',alignItems:'center',gap:8,height:38,padding:'0 12px',borderRadius:12,background:'var(--ink)',color:'white',textDecoration:'none',fontSize:12,fontWeight:700}}>
            <Ic name="home" size={14} color="white"/> 메인으로
          </a>
        </aside>
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          {pg==='patients'&&<PPage pts={PTS} sid={sid} setSid={setSid} q={q} setQ={setQ} onRx={()=>setRxM(true)}/>}
          {pg==='notes'&&<NPage pts={PTS}/>}
          {pg==='co-stats'&&<CPage pts={PTS}/>}
          {pg==='alerts'&&<APage pts={PTS}/>}
          {pg==='prescriptions'&&<RPage pts={PTS} onNew={()=>setRxM(true)}/>}
        </div>
      </div>
      {rxM&&<RxModal pts={PTS} did={sid} onClose={()=>setRxM(false)}/>}
    </div>
  );
}
function PPage({pts,sid,setSid,q,setQ,onRx}){
  const[per,setPer]=useState('4주');
  const sel=pts.find(p=>p.id===sid);
  const coData=useMemo(()=>gCO(sel.rk,sel.co),[sid]);
  const fil=pts.filter(p=>p.nm.includes(q)||p.tp.includes(q));
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 20px',borderBottom:'1px solid var(--ln)',background:'white',flexShrink:0}}>
        <div>
          <div style={{fontSize:10,color:'var(--i3)',fontWeight:700}}>환자 관리</div>
          <h1 style={{fontSize:19,fontWeight:800,marginTop:2}}>{sel.nm} <span style={{fontSize:12,fontWeight:600,color:'var(--i3)'}}>· {sel.age}세 · {sel.sex} · #{sel.id.toUpperCase()}</span></h1>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,height:36,padding:'0 14px',background:'#F4F7F5',borderRadius:999,minWidth:180}}>
            <Ic name="search" size={14} color="var(--i3)"/>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="환자 검색…" style={{border:'none',background:'transparent',outline:'none',fontSize:13,fontWeight:600,color:'var(--ink)',width:'100%',padding:0}}/>
          </div>
          <button onClick={onRx} className="tp" style={{height:36,padding:'0 14px',borderRadius:999,background:'var(--ink)',color:'white',border:'none',fontWeight:700,fontSize:12,display:'flex',alignItems:'center',gap:6}}>
            <Ic name="note" size={13} color="white"/>처방 작성
          </button>
        </div>
      </div>
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        <div style={{width:248,borderRight:'1px solid var(--ln)',background:'white',overflowY:'auto'}} className="sc">
          <div style={{padding:'10px 12px 6px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:10,fontWeight:800,color:'var(--i3)'}}>활성 환자 · {fil.length}명</span>
            <button style={{width:26,height:26,borderRadius:8,background:'var(--g0)',color:'var(--g7)',border:'none',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic name="filter" size={13}/></button>
          </div>
          {fil.map(p=>{const on=p.id===sid;return(
            <div key={p.id} onClick={()=>setSid(p.id)} className="tp" style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:on?'var(--g0)':'transparent',borderLeft:on?'3px solid var(--g5)':'3px solid transparent',cursor:'pointer'}}>
              <div className="av" style={{width:33,height:33,fontSize:12,flexShrink:0}}>{p.nm[0]}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:5}}>
                  <span style={{fontSize:13,fontWeight:800}}>{p.nm}</span>
                  {p.rk==='high'&&<span style={{width:7,height:7,borderRadius:999,background:'var(--da)'}}/>}
                  {p.rk==='med'&&<span style={{width:7,height:7,borderRadius:999,background:'var(--wa)'}}/>}
                </div>
                <div style={{fontSize:10,color:'var(--i3)',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.tp}</div>
                <div style={{fontSize:10,color:'var(--i3)',marginTop:1}}>{p.sk}일 · {p.last}</div>
              </div>
            </div>
          );})}
          {!fil.length&&<div style={{padding:'20px',textAlign:'center',color:'var(--i3)',fontSize:13}}>검색 결과 없음</div>}
        </div>
        <div key={sid} className="fd sc" style={{flex:1,overflowY:'auto',padding:16}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
            {[
              {lb:'현재 스트릭',v:sel.sk,              u:'일', tr:sel.sk>20?'+5 vs 4주':'유지',   cl:sel.sk>20?'#5BC23B':sel.sk>5?'#FFB930':'#E65A4A',ic:'flame'},
              {lb:'평균 CO',    v:(sel.co+1.2).toFixed(1),u:'ppm',tr:sel.rk==='low'?'−3.8 ppm':'+2.1',cl:sel.co<5?'#2A6FAA':'#E65A4A',ic:'co'},
              {lb:'트리거 기록',v:Math.floor(20+sel.co*4),u:'건',tr:'이번 달',                     cl:'#FF7A2E',ic:'bolt'},
              {lb:'CBT 완료율', v:Math.max(30,100-sel.co*5),u:'%',tr:sel.rk==='low'?'+12%':'−6%', cl:'#6F44E2',ic:'note'},
            ].map((k,i)=>(
              <div key={i} style={{background:'white',borderRadius:16,padding:14,boxShadow:'var(--sh)'}}>
                <div style={{width:30,height:30,borderRadius:9,background:k.cl+'22',color:k.cl,display:'flex',alignItems:'center',justifyContent:'center'}}><Ic name={k.ic} size={15} color={k.cl}/></div>
                <div style={{fontSize:10,fontWeight:700,color:'var(--i3)',marginTop:8}}>{k.lb}</div>
                <div style={{fontSize:22,fontWeight:800,display:'flex',alignItems:'baseline',gap:3,marginTop:2}}>{k.v}<span style={{fontSize:10,color:'var(--i3)',fontWeight:700}}>{k.u}</span></div>
                <div style={{fontSize:10,fontWeight:700,color:'var(--g7)',marginTop:2}}>{k.tr}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:12,background:'white',borderRadius:18,padding:16,boxShadow:'var(--sh)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div><div style={{fontSize:10,fontWeight:800,color:'var(--i3)',textTransform:'uppercase'}}>호기 CO 추이</div><div style={{fontSize:15,fontWeight:800,marginTop:2}}>최근 {per} · 일별 측정</div></div>
              <div style={{display:'flex',gap:3,background:'#F4F7F5',borderRadius:8,padding:3}}>
                {['1주','4주','12주'].map(t=><button key={t} onClick={()=>setPer(t)} style={{height:26,padding:'0 10px',borderRadius:6,background:per===t?'white':'transparent',color:per===t?'var(--ink)':'var(--i3)',border:'none',fontSize:11,fontWeight:700}}>{t}</button>)}
              </div>
            </div>
            <COCh data={coData} per={per}/>
          </div>
          <div style={{marginTop:12,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div style={{background:'white',borderRadius:18,padding:16,boxShadow:'var(--sh)'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><span style={{fontSize:13,fontWeight:800}}>트리거 기록</span><span style={{fontSize:10,color:'var(--i3)',fontWeight:700}}>이번 주 · {Math.floor(5+sel.co)}건</span></div>
              {(sel.id==='p3'?[{t:'어제 23:14',e:'사회적 압박',u:9,s:'회식'},{t:'그제 21:30',e:'스트레스',u:7,s:'술자리'},{t:'월 18:00',e:'지루함',u:5,s:'귀가 후'}]:
                sel.id==='p6'?[{t:'3일 전',e:'습관',u:8,s:'점심'},{t:'4일 전',e:'습관',u:7,s:'커피'}]:
                [{t:'오늘 14:22',e:'스트레스',u:7,s:'회의 직후'},{t:'어제 21:04',e:'지루함',u:4,s:'귀가 후'},{t:'월 12:30',e:'스트레스',u:6,s:'점심 후'}]
              ).map((r,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderTop:i?'1px solid var(--ln)':'none'}}>
                  <div style={{width:34,height:34,borderRadius:10,background:r.u>=6?'var(--db)':'var(--wb)',color:r.u>=6?'var(--da)':'var(--wa)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Ic name="bolt" size={16}/></div>
                  <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700}}>{r.e} <span style={{color:'var(--i3)',fontWeight:600}}>· {r.s}</span></div><div style={{fontSize:10,color:'var(--i3)'}}>{r.t}</div></div>
                  <div style={{fontSize:15,fontWeight:800}}>{r.u}<span style={{fontSize:9,color:'var(--i3)'}}>/10</span></div>
                </div>
              ))}
            </div>
            <div style={{background:'white',borderRadius:18,padding:16,boxShadow:'var(--sh)'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><span style={{fontSize:13,fontWeight:800}}>CBT 응답 이력</span><span style={{fontSize:11,color:'var(--g7)',fontWeight:700}}>최근 응답 →</span></div>
              <div style={{padding:12,background:'var(--g0)',borderRadius:12}}>
                <div style={{fontSize:10,color:'var(--g7)',fontWeight:800}}>2월 14일 · Q3</div>
                <div style={{fontSize:12,fontWeight:700,marginTop:2}}>"5분 뒤 어떤 모습일까요?"</div>
                <div style={{fontSize:11,color:'var(--i2)',marginTop:4,lineHeight:1.5}}>"회의 끝나고 옥상 대신 책상에서 5분 호흡만 해봐도 머리가 좀 가벼워질 것 같아…"</div>
              </div>

function COCh({data,per}){
  const W=800,H=180,P=18;
  const d=per==='1주'?data.slice(-7):data;
  const mx=Math.max(16,Math.ceil(Math.max(...d)+1));
  const x=i=>P+(i*(W-P*2))/Math.max(1,d.length-1);
  const y=v=>H-P-(v*(H-P*2))/mx;
  const path=d.map((v,i)=>(i===0?'M':'L')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' ');
  const area=path+` L${x(d.length-1).toFixed(1)} ${H-P} L${x(0).toFixed(1)} ${H-P} Z`;
  const last=d[d.length-1];const cl=last<5?'#5BC23B':last<10?'#FFB930':'#E65A4A';
  const lb=per==='1주'?['월','화','수','목','금','토','오늘']:['4주 전','3주 전','2주 전','1주 전','오늘'];
  return(
    <div style={{marginTop:10}}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{display:'block'}}>
        <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={cl} stopOpacity=".2"/><stop offset="100%" stopColor={cl} stopOpacity="0"/></linearGradient></defs>
        {[4,8,12].filter(v=>v<mx).map(v=><g key={v}><line x1={P} x2={W-P} y1={y(v)} y2={y(v)} stroke="#E4EFE6" strokeDasharray="3 4"/><text x={W-P+4} y={y(v)+3} fontSize="9" fill="#8A9E94" fontWeight="700">{v}</text></g>)}
        <path d={area} fill="url(#cg)"/>
        <path d={path} fill="none" stroke={cl} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
        {d.map((v,i)=><circle key={i} cx={x(i)} cy={y(v)} r={i===d.length-1?4:2} fill={i===d.length-1?'#0F2A1E':cl} stroke="white" strokeWidth={i===d.length-1?2:0}/>)}
      </svg>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#8A9E94',fontWeight:700,padding:'2px 14px 0'}}>
        {lb.map((l,i)=><span key={i}>{l}</span>)}
      </div>
    </div>
  );
}
