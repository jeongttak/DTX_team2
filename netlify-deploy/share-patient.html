<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Purely:SOOM · 환자 앱 풀 플로우</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
/* Purely:SOOM design tokens */
:root {
  --green-700: #2F8A3E;
  --green-600: #3FAA48;
  --green-500: #5BC23B;   /* bright green primary */
  --green-400: #7DD957;   /* kiwi */
  --green-300: #A5E66B;
  --green-200: #C9F08D;
  --green-100: #E5F8D0;
  --green-50:  #F2FBE6;

  --teal-900: #0E3A2C;
  --teal-700: #1B5240;
  --lung-blue: #7FB8D9;
  --lung-blue-50: #EBF4FB;

  --ink:    #0F2A1E;
  --ink-2:  #3F5A50;
  --ink-3:  #8A9E94;
  --ink-4:  #C6D0CB;
  --line:   #E4EFE6;
  --bg:     #F6FBF1;
  --white:  #FFFFFF;

  --warn:   #F2A93B;
  --warn-bg: #FFF4DC;
  --danger: #E65A4A;
  --danger-bg: #FFE6E1;

  --xp:     #FFB930;
  --berry:  #6F44E2;

  --shadow-sm: 0 1px 2px rgba(15,42,30,.04), 0 2px 8px rgba(15,42,30,.04);
  --shadow-md: 0 2px 6px rgba(15,42,30,.05), 0 12px 28px rgba(15,42,30,.07);
  --shadow-lg: 0 8px 24px rgba(15,42,30,.10), 0 24px 60px rgba(15,42,30,.12);

  --r-card: 22px;
  --r-pill: 999px;
  --r-chip: 14px;
}

.ps-screen {
  width: 390px;
  height: 844px;
  background: var(--white);
  color: var(--ink);
  font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', system-ui, sans-serif;
  font-feature-settings: 'ss01', 'ss02';
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  position: relative;
  letter-spacing: -0.01em;
}
.ps-screen *, .ps-screen *::before, .ps-screen *::after { box-sizing: border-box; }
.ps-screen h1, .ps-screen h2, .ps-screen h3, .ps-screen h4 {
  margin: 0;
  font-family: 'SF Pro Display', -apple-system, 'Pretendard', system-ui, sans-serif;
  letter-spacing: -0.02em;
  font-weight: 700;
}
.ps-screen button { font-family: inherit; }

.ps-statusbar {
  position: relative; z-index: 5;
  height: 54px; padding: 18px 28px 0;
  display: flex; align-items: center; justify-content: space-between;
  font-family: 'SF Pro Text', -apple-system, system-ui, sans-serif;
  font-weight: 600; font-size: 17px; color: var(--ink);
}
.ps-statusbar .icons { display: flex; gap: 6px; align-items: center; }

/* Bottom tab bar */
.ps-tabbar {
  position: absolute; left: 14px; right: 14px; bottom: 14px;
  height: 70px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 999px;
  display: flex; align-items: center; justify-content: space-around;
  padding: 0 12px;
  box-shadow: 0 4px 14px rgba(15,42,30,.06), 0 14px 36px rgba(15,42,30,.10);
  border: 1px solid rgba(255,255,255,0.8);
  z-index: 10;
}
.ps-tab {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600;
  color: var(--ink-3);
  flex: 1; padding: 8px 4px; border-radius: 999px;
  cursor: pointer;
  text-decoration: none;
}
.ps-tab.active { color: var(--green-700); }
.ps-tab.active .ps-tabicon { background: var(--green-100); color: var(--green-700); }
.ps-tabicon {
  width: 36px; height: 36px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-3);
}

/* Glass pill button */
.ps-pill {
  height: 42px; padding: 0 16px;
  border-radius: 999px;
  background: rgba(255,255,255,0.92);
  border: 1px solid rgba(255,255,255,0.7);
  box-shadow: 0 1px 2px rgba(15,42,30,.04), 0 4px 14px rgba(15,42,30,.06);
  display: inline-flex; align-items: center; gap: 6px;
  font-weight: 600; font-size: 14px; color: var(--ink);
}

/* Card */
.ps-card {
  background: var(--white);
  border-radius: var(--r-card);
  box-shadow: var(--shadow-sm);
  padding: 18px;
}
.ps-card-soft {
  background: var(--green-50);
  border-radius: var(--r-card);
  padding: 18px;
}

/* Chip */
.ps-chip {
  display: inline-flex; align-items: center; gap: 6px;
  height: 28px; padding: 0 10px;
  background: var(--green-100); color: var(--green-700);
  border-radius: var(--r-chip);
  font-size: 12px; font-weight: 700;
  letter-spacing: 0;
}

/* Primary CTA */
.ps-cta {
  height: 56px; width: 100%;
  background: var(--ink);
  color: var(--white);
  border-radius: 999px;
  border: none;
  font-size: 17px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 8px 20px rgba(15,42,30,.18);
  cursor: pointer;
}
.ps-cta.green { background: var(--green-500); color: white; box-shadow: 0 8px 20px rgba(91,194,59,.32); }
.ps-cta:disabled { background: var(--ink-4); box-shadow: none; cursor: not-allowed; }

/* Gradient header bg */
.ps-headergrad {
  position: absolute; inset: 0 0 auto 0;
  height: 340px;
  background:
    radial-gradient(120% 80% at 50% 0%, var(--green-200) 0%, var(--green-100) 35%, transparent 70%),
    linear-gradient(180deg, var(--green-100) 0%, transparent 80%);
  pointer-events: none;
  z-index: 0;
}

/* Text styles */
.ps-h1 { font-size: 32px; line-height: 1.1; font-weight: 800; letter-spacing: -0.03em; }
.ps-h2 { font-size: 24px; line-height: 1.15; font-weight: 800; letter-spacing: -0.025em; }
.ps-h3 { font-size: 18px; line-height: 1.2; font-weight: 700; }
.ps-eyebrow {
  font-size: 12px; font-weight: 700; color: var(--green-700);
  letter-spacing: 0.04em; text-transform: uppercase;
}
.ps-muted { color: var(--ink-2); }
.ps-tiny { font-size: 11px; color: var(--ink-3); font-weight: 600; }

/* Scrollable content area */
.ps-content { position: relative; z-index: 1; padding: 0 20px 110px; }
.ps-content.scroll { height: calc(100% - 54px); overflow-y: auto; }
.ps-content.scroll::-webkit-scrollbar { display: none; }

/* Progress dots */
.ps-dots { display: flex; gap: 6px; align-items: center; }
.ps-dot { width: 6px; height: 6px; border-radius: 999px; background: var(--ink-4); }
.ps-dot.on { background: var(--green-500); width: 22px; }

/* Avatar circle */
.ps-avatar {
  width: 36px; height: 36px; border-radius: 999px;
  background: linear-gradient(135deg, var(--lung-blue), var(--green-300));
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 14px;
  border: 2px solid white;
  box-shadow: 0 2px 6px rgba(15,42,30,.10);
}

/* Number badge */
.ps-numbadge {
  display: inline-flex; align-items: baseline; gap: 4px;
  font-weight: 800;
}

/* Selectable card (likert) */
.ps-likert {
  flex: 1;
  height: 56px;
  border-radius: 18px;
  border: 1.5px solid var(--line);
  background: white;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: var(--ink-2);
  cursor: pointer;
  gap: 2px;
}
.ps-likert .num { font-size: 18px; font-weight: 800; color: var(--ink); }
.ps-likert.on {
  background: var(--green-500); border-color: var(--green-500); color: white;
  box-shadow: 0 6px 16px rgba(91,194,59,.30);
}
.ps-likert.on .num { color: white; }

/* progress bar */
.ps-progress {
  height: 6px; background: var(--green-100); border-radius: 999px; overflow: hidden;
}
.ps-progress > div { height: 100%; background: var(--green-500); border-radius: 999px; transition: width .5s cubic-bezier(.2,.7,.3,1); }

/* ── Animations ────────────────────────────────────────────────── */
@keyframes ps-bob       { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes ps-bob-sm    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
@keyframes ps-pulse     { 0%,100%{transform:scale(1);opacity:.55} 50%{transform:scale(1.1);opacity:.25} }
@keyframes ps-pulse-2   { 0%,100%{transform:scale(.9);opacity:.5} 50%{transform:scale(1.05);opacity:.2} }
@keyframes ps-spin      { to { transform: rotate(360deg) } }
@keyframes ps-fade-up   { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: none } }
@keyframes ps-pop       { 0%{transform:scale(.7);opacity:0} 60%{transform:scale(1.06)} 100%{transform:scale(1);opacity:1} }
@keyframes ps-breath    { 0%,100%{transform:scale(.94)} 50%{transform:scale(1.06)} }
@keyframes ps-shimmer   { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes ps-caret     { 50% { opacity: 0 } }
@keyframes ps-slide-up  { from { transform: translateY(100%) } to { transform: translateY(0) } }

.ps-anim-bob     { animation: ps-bob 4s ease-in-out infinite; }
.ps-anim-bob-sm  { animation: ps-bob-sm 3s ease-in-out infinite; }
.ps-anim-breath  { animation: ps-breath 5s ease-in-out infinite; transform-origin: center; }
.ps-anim-pulse   { animation: ps-pulse 3s ease-in-out infinite; }
.ps-anim-pop     { animation: ps-pop .35s cubic-bezier(.2,.9,.3,1.2) both; }
.ps-anim-fade-up { animation: ps-fade-up .35s cubic-bezier(.2,.7,.3,1) both; }
.ps-anim-spin    { animation: ps-spin 1s linear infinite; }

/* Sheet/modal */
.ps-sheet-backdrop {
  position: absolute; inset: 0;
  background: rgba(15,42,30,0.35);
  z-index: 50;
  animation: ps-fade-up .25s ease-out both;
}
.ps-sheet {
  position: absolute; left: 0; right: 0; bottom: 0;
  background: white;
  border-radius: 28px 28px 0 0;
  box-shadow: 0 -8px 32px rgba(15,42,30,.18);
  padding: 12px 22px 28px;
  z-index: 51;
  animation: ps-slide-up .32s cubic-bezier(.2,.7,.3,1) both;
}
.ps-sheet-handle {
  width: 38px; height: 4px; background: var(--ink-4); border-radius: 999px;
  margin: 4px auto 12px;
}

/* CO measuring ring fill — pure CSS so it's compositor-driven and smooth */
@keyframes ps-co-fill {
  from { stroke-dashoffset: 691; }
  to   { stroke-dashoffset: 0; }
}
.ps-co-ring {
  animation: ps-co-fill 5s linear forwards;
  transform: rotate(-90deg);
  transform-origin: center;
}

/* Tap feedback */
.ps-tap { transition: transform .15s ease, box-shadow .15s ease; cursor: pointer; }
.ps-tap:active { transform: scale(0.97); }
    :root { color-scheme: light; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, 'Pretendard', 'Apple SD Gothic Neo', system-ui, sans-serif;
      background:
        radial-gradient(80% 60% at 20% 0%, #E5F8D0 0%, transparent 60%),
        radial-gradient(70% 60% at 100% 100%, #DCEEF8 0%, transparent 55%),
        #F4F2EC;
      min-height: 100vh;
      overflow: hidden;
    }
    .stage {
      position: fixed; inset: 0;
      display: grid;
      grid-template-columns: 320px 1fr;
    }
    .side {
      padding: 28px 28px 24px;
      display: flex; flex-direction: column; gap: 18px;
      border-right: 1px solid rgba(15,42,30,0.07);
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(20px);
      overflow-y: auto;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand img { height: 38px; }
    .brand .t h1 { font-size: 15px; margin: 0; font-weight: 800; color: #0F2A1E; letter-spacing: -0.01em; }
    .brand .t p  { font-size: 11px; margin: 2px 0 0; color: #4A5B55; font-weight: 700; }
    .lead { font-size: 22px; font-weight: 800; color: #0F2A1E; letter-spacing: -0.02em; line-height: 1.25; text-wrap: pretty; }
    .lead em { font-style: normal; background: linear-gradient(180deg, transparent 60%, #C8F0A0 60%); padding: 0 2px; }
    .desc { font-size: 13px; color: #3A4A44; line-height: 1.6; font-weight: 500; }
    .quick-label { font-size: 10px; font-weight: 800; letter-spacing: .12em; color: #4A5B55; text-transform: uppercase; margin-bottom: 4px; }
    .quick { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .quick button {
      appearance: none; border: 1px solid rgba(15,42,30,0.08);
      background: rgba(255,255,255,0.6);
      padding: 10px 12px; border-radius: 12px;
      font-family: inherit; font-size: 12px; font-weight: 700; color: #0F2A1E;
      cursor: pointer; transition: all .15s; text-align: left;
      display: flex; align-items: center; gap: 8px;
    }
    .quick button:hover { background: white; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(15,42,30,0.06); }
    .quick button.is-active { background: #0F2A1E; color: white; border-color: #0F2A1E; }
    .quick button .dot { width: 8px; height: 8px; border-radius: 999px; background: #7DD957; box-shadow: 0 0 0 3px rgba(125,217,87,0.25); }
    .quick button.is-active .dot { background: #A5E66B; box-shadow: 0 0 0 3px rgba(165,230,107,0.35); }
    .footnote { margin-top: auto; padding-top: 18px; border-top: 1px dashed rgba(15,42,30,0.1); font-size: 11px; color: #6B7B75; font-weight: 600; line-height: 1.55; }
    .footnote a { color: #2F8A3E; text-decoration: none; font-weight: 700; }
    .phone-wrap { position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .phone-wrap::before { content: ''; position: absolute; inset: 0; background: radial-gradient(40% 50% at 50% 50%, rgba(125,217,87,0.18) 0%, transparent 70%); pointer-events: none; }
    .phone { width: 390px; height: 844px; background: #000; border-radius: 54px; padding: 12px; box-shadow: 0 1px 0 1px rgba(255,255,255,0.6) inset, 0 60px 100px -30px rgba(15,42,30,0.35), 0 20px 40px -10px rgba(15,42,30,0.2); position: relative; transform-origin: center center; }
    .phone-screen { width: 100%; height: 100%; background: #f0eee9; border-radius: 44px; overflow: hidden; position: relative; }
    .phone-notch { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); width: 110px; height: 32px; background: #000; border-radius: 999px; z-index: 50; pointer-events: none; }
    @media (max-width: 900px) { .stage { grid-template-columns: 1fr; grid-template-rows: auto 1fr; } .side { border-right: none; border-bottom: 1px solid rgba(15,42,30,0.07); } .phone { transform: scale(0.85); } }
    @media (max-height: 900px) and (min-width: 901px) { .phone { transform: scale(0.88); } }
    @media (max-height: 800px) { .phone { transform: scale(0.78); } }
  </style>
</head>

  <script type="text/babel">
// tokens.jsx — shared atoms for Purely:SOOM screens
// Exposes globally via window: StatusBar, TabBar, Soomi, Sprout, Lung, Icon, PSChip, PSPill
// Plus character variants and small SVG icons.

const { useState } = React;

function StatusBar({ time = '9:41', dark = false }) {
  const c = dark ? '#fff' : '#0F2A1E';
  return (
    <div className="ps-statusbar" style={{ color: c }}>
      <span>{time}</span>
      <div className="icons">
        <svg width="18" height="11" viewBox="0 0 18 11"><rect x="0" y="7" width="3" height="4" rx="0.7" fill={c}/><rect x="5" y="4.5" width="3" height="6.5" rx="0.7" fill={c}/><rect x="10" y="2" width="3" height="9" rx="0.7" fill={c}/><rect x="15" y="0" width="3" height="11" rx="0.7" fill={c}/></svg>
        <svg width="16" height="11" viewBox="0 0 16 11"><path d="M8 3a8 8 0 0 1 5.7 2.3l1-1A9.4 9.4 0 0 0 8 1.6 9.4 9.4 0 0 0 1.3 4.3l1 1A8 8 0 0 1 8 3Z" fill={c}/><path d="M8 6.3a4.8 4.8 0 0 1 3.4 1.4l1-1A6.2 6.2 0 0 0 8 4.9a6.2 6.2 0 0 0-4.4 1.8l1 1A4.8 4.8 0 0 1 8 6.3Z" fill={c}/><circle cx="8" cy="9.5" r="1.4" fill={c}/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="3.2" stroke={c} strokeOpacity=".4" fill="none"/><rect x="2" y="2" width="19" height="8" rx="2" fill={c}/><path d="M24 4v4c.8-.3 1.5-1 1.5-2s-.7-1.7-1.5-2Z" fill={c} fillOpacity=".5"/></svg>
      </div>
    </div>
  );
}

// Tab bar — active tab is the one matching `active` prop
function TabBar({ active = 'home', onChange = () => {} }) {
  const items = [
    { id: 'home',     label: '홈',     icon: 'home' },
    { id: 'mission',  label: '미션',   icon: 'target' },
    { id: 'co',       label: 'CO 측정', icon: 'pulse' },
    { id: 'char',     label: '캐릭터', icon: 'paw' },
    { id: 'cal',      label: '캘린더', icon: 'cal' },
  ];
  return (
    <div className="ps-tabbar">
      {items.map(it => (
        <div key={it.id} className={'ps-tab' + (it.id === active ? ' active' : '')} onClick={() => onChange(it.id)}>
          <div className="ps-tabicon"><TabIcon name={it.icon} /></div>
        </div>
      ))}
    </div>
  );
}

function TabIcon({ name }) {
  const s = { width: 22, height: 22, fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' };
  if (name === 'home')   return <svg {...s} viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1Z"/></svg>;
  if (name === 'target') return <svg {...s} viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg>;
  if (name === 'pulse')  return <svg {...s} viewBox="0 0 24 24"><path d="M3 12h4l2-6 4 12 2-6h6"/></svg>;
  if (name === 'paw')    return <svg {...s} viewBox="0 0 24 24"><circle cx="6" cy="10" r="2"/><circle cx="10" cy="6" r="2"/><circle cx="14" cy="6" r="2"/><circle cx="18" cy="10" r="2"/><path d="M7 18c0-3 2-5 5-5s5 2 5 5a3 3 0 0 1-3 3 4 4 0 0 1-2-.6 4 4 0 0 1-2 .6 3 3 0 0 1-3-3Z"/></svg>;
  if (name === 'cal')    return <svg {...s} viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>;
  return null;
}

// ── Soomi: the lung-leaf mascot ─────────────────────────────────
// Variations by `mood` and `accent`. Renders as inline SVG.
function Soomi({ size = 180, mood = 'happy', accent = '#7DD957', pose = 'idle' }) {
  // Eyes per mood
  const eyes = {

  { type: 'stress', q: '기분이 나쁘거나 화가 날 때 담배 생각이 가장 먼저 난다.' },
  { type: 'neg',    q: '누군가 내 말을 무시하거나 반응하지 않으면 나를 싫어한다고 느낀다.' },
  { type: 'effi',   q: '작은 실수에도 "나는 역시 안 된다"는 생각이 자주 든다.' },
  { type: 'effi',   q: '금연을 시도해도 결국 실패할 것 같다는 생각이 든다.' },

function ScreenOnboarding({ onComplete }) {

  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState(Array(10).fill(0));

  // Pre-fill plausible answers as user navigates; we just store live picks
  const setPick = (n) => {
    const next = [...answers];
    next[step] = n;
    setAnswers(next);
    // auto-advance after a short delay
    setTimeout(() => {
      setStep(s => Math.min(s + 1, 10));
    }, 280);
  };

  if (step === 10) return <OnboardingResult answers={answers} onReset={() => { setStep(0); setAnswers(Array(10).fill(0)); }} onComplete={onComplete} />;

  const Q = QUESTIONS[step];
  const pick = answers[step];

  return (
    <div className="ps-screen" data-screen-label="01 Onboarding · 문항">

}

function OnboardingResult({ answers, onReset, onComplete }) {
  // Score by type
  const totals = { stress: 0, neg: 0, effi: 0, social: 0, habit: 0, rest: 0 };
  QUESTIONS.forEach((q, i) => {
    const v = answers[i] || 0;
    totals[q.type] += v;
  });
  const sum = Object.values(totals).reduce((a, b) => a + b, 0) || 1;
  let breakdown = Object.entries(totals)
    .map(([k, v]) => ({ key: k, ...TYPES[k], pct: Math.round((v / sum) * 100) }))
    .filter(t => t.pct > 0)
    .sort((a, b) => b.pct - a.pct);
  // Take top 3, redistribute so top 3 sums to 100
  breakdown = breakdown.slice(0, 3);
  const top3Sum = breakdown.reduce((s, t) => s + t.pct, 0) || 1;
  breakdown = breakdown.map(t => ({ ...t, pct: Math.max(1, Math.round((t.pct / top3Sum) * 100)) }));
  const drift = 100 - breakdown.reduce((s, t) => s + t.pct, 0);
  if (breakdown[0]) breakdown[0].pct += drift;

  const top = breakdown[0];
  const summaryLine = breakdown.map(t => `${t.label} ${t.pct}%`).join(' + ');

  return (
    <div className="ps-screen" data-screen-label="01 Onboarding · 결과">

          <div className="ps-muted" style={{ marginTop: 6, fontSize: 14, padding: '0 8px', lineHeight: 1.45 }}>{top?.insight}.</div>
        </div>

        {/* Stacked bar */}
        <div className="ps-anim-fade-up" style={{ marginTop: 22, height: 14, borderRadius: 999, overflow: 'hidden', display: 'flex', boxShadow: 'inset 0 0 0 1px rgba(15,42,30,.06)' }}>
          {breakdown.map(t => <div key={t.key} style={{ width: t.pct + '%', background: t.color, transition: 'width .8s cubic-bezier(.2,.7,.3,1)' }} />)}
        </div>

        {/* One-liner summary card */}
        <div style={{ marginTop: 16, background: 'white', borderRadius: 18, padding: '14px 16px', boxShadow: 'var(--shadow-sm)', borderLeft: `4px solid ${top?.color}` }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--ink-3)', letterSpacing: '.05em', textTransform: 'uppercase' }}>한 줄 요약</div>
          <div style={{ fontSize: 13, marginTop: 4, color: 'var(--ink)', lineHeight: 1.5 }}>당신의 흡연 패턴은 <strong>{summaryLine}</strong>입니다.</div>
        </div>

        {/* Breakdown list */}
        <div style={{ marginTop: 14, display: 'flex', flexDirection: 'column', gap: 10 }}>
          {breakdown.map((t, i) => (
            <div key={t.key} className="ps-anim-fade-up" style={{ display: 'flex', alignItems: 'center', gap: 14, background: 'white', borderRadius: 18, padding: '14px 16px', boxShadow: 'var(--shadow-sm)', animationDelay: (i * 80) + 'ms' }}>
              <div style={{ width: 44, height: 44, borderRadius: 14, background: t.color, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', flexShrink: 0 }}>
                <Icon name={t.icon} size={22}/>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 15, color: 'var(--ink)' }}>{t.label}</div>
                <div style={{ fontSize: 12, color: 'var(--ink-3)', marginTop: 2 }}>{t.desc}</div>
              </div>
              <div style={{ fontWeight: 800, fontSize: 22, color: 'var(--ink)', letterSpacing: '-0.02em' }}>{t.pct}<span style={{ fontSize: 12, color: 'var(--ink-3)', fontWeight: 700 }}>%</span></div>
            </div>
          ))}
        </div>

        {/* Coaching preview — Soomi quote */}
        {top ? (
          <div style={{ marginTop: 16, background: 'white', borderRadius: 22, padding: 16, boxShadow: 'var(--shadow-md)', border: '1.5px solid ' + top.color + '55' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
              <div style={{ width: 32, height: 32, borderRadius: 10, background: top.color, color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="sparkle" size={16}/></div>
              <div>
                <div style={{ fontSize: 11, fontWeight: 800, color: top.color, letterSpacing: '.05em', textTransform: 'uppercase' }}>맞춤 코칭 미리보기</div>
                <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--ink)' }}>{top.label}을 위한 코칭</div>
              </div>
            </div>
            <div style={{ fontSize: 14, lineHeight: 1.55, color: 'var(--ink)', padding: '12px 14px', background: 'var(--green-50)', borderRadius: 14 }}>"{top.coach}"</div>

            <div style={{ marginTop: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--ink-3)', letterSpacing: '.05em', textTransform: 'uppercase', marginBottom: 6 }}>추천 미션</div>

                {top.missions.map((m, i) => (
                  <span key={i} className="ps-chip" style={{ background: top.color + '22', color: top.color === '#FFB930' ? '#7A4A00' : top.color === '#A5E66B' ? '#2F8A3E' : top.color }}>{m}</span>

        <div className="ps-card-soft" style={{ marginTop: 14, display: 'flex', alignItems: 'center', gap: 12 }}>

          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700 }}>맞춤 4주 CBT 코스 준비 완료</div>
            <div style={{ fontSize: 11, color: 'var(--ink-3)', marginTop: 2 }}>{breakdown.map(t => t.short).join(' · ')} 모듈 포함</div>
          </div>
          <Icon name="chev" size={18} color="var(--ink-3)"/>
        </div>

        <button onClick={onComplete} className="ps-cta green ps-tap" style={{ marginTop: 16 }}>금연 여정 시작하기</button>
        <button onClick={onReset} className="ps-tap" style={{ width: '100%', height: 48, marginTop: 8, background: 'transparent', border: 'none', color: 'var(--ink-2)', fontWeight: 600, fontSize: 14 }}>다시 풀어보기 ↺</button>

}

  <script type="text/babel">
// screen-trigger.jsx — Interactive 3-step flow: state check → trigger log → Socratic Q

const trigStyles = {
  bg: { position: 'absolute', inset: 0, background: 'linear-gradient(180deg, #FFF4DC 0%, #FFFAF0 35%, #FFFFFF 70%)', zIndex: 0 },

  step: { display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 11, fontWeight: 700, color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: '.06em' },

};

function ScreenTriggerFlow({ onComplete }) {
  const [step, setStep] = useState(1);   // 1 = state, 2 = log, 3 = socratic, 4 = done
  const [urge, setUrge] = useState(7);
  const [emo, setEmo]   = useState(['stress']);
  const [where, setWhere] = useState('회의실');
  const [who,   setWho]   = useState('혼자');
  const [didSmoke, setDidSmoke] = useState(null);
  const [socAnswer, setSocAnswer] = useState('회의 끝나고 옥상 가서 한 대 피우면 머리가 비워지니까. 근데 사실 5분 잠깐 자리 비우면 비슷한 효과가 있는 것 같기도 해.');

  const next = () => setStep(s => Math.min(4, s + 1));
  const prev = () => setStep(s => Math.max(1, s - 1));

  return (
    <div className="ps-screen" data-screen-label={`02 트리거 · ${step}단계`}>
      <div style={step === 3 ? trigStyles.bgBlue : trigStyles.bg} />
      <StatusBar />
      <div className="ps-content scroll" style={{ paddingBottom: 30 }}>
        {/* Top: close + 3-segment progress */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, position: 'sticky', top: 0, background: 'transparent', paddingBottom: 6 }}>

            <Icon name={step === 1 ? 'close' : 'chev-l'} size={18}/>
          </button>
          <div style={{ flex: 1, display: 'flex', gap: 4 }}>
            {[1,2,3].map(i => (

            ))}
          </div>
        </div>

        {step === 1 && <StepStateCheck urge={urge} setUrge={setUrge} emo={emo} setEmo={setEmo} onNext={next}/>}
        {step === 2 && <StepTriggerLog where={where} setWhere={setWhere} who={who} setWho={setWho} didSmoke={didSmoke} setDidSmoke={setDidSmoke} onNext={next}/>}
        {step === 3 && <StepSocratic answer={socAnswer} setAnswer={setSocAnswer} onNext={next}/>}
        {step === 4 && <StepDone onReset={() => setStep(1)} onComplete={onComplete}/>}

  );
}

function StepStateCheck({ urge, setUrge, emo, setEmo, onNext }) {
  const emotions = [
    { id: 'stress', label: '스트레스', icon: 'bolt', color: '#E65A4A' },
    { id: 'anxiety', label: '불안',    icon: 'wind', color: '#F2A93B' },

    { id: 'angry',   label: '짜증',    icon: 'flame',color: '#D65A2B' },
    { id: 'happy',   label: '기쁨',    icon: 'sparkle',color: '#5BC23B' },
  ];
  const toggle = id => setEmo(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

  const onSlider = (e) => {
    const r = e.currentTarget.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width;
    setUrge(Math.max(1, Math.min(10, Math.round(x * 10))));

  return (
    <div className="ps-anim-fade-up">
      <div style={{ marginTop: 18 }}>
        <div style={trigStyles.step}><span style={{ color: '#D08A3D' }}>● 트리거 감지 14:22</span></div>

        <div className="ps-muted" style={{ fontSize: 13, marginTop: 6 }}>한 호흡 쉬고, 솔직하게 골라봐요.</div>
      </div>

      <div style={trigStyles.card}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
          <div style={{ fontSize: 14, fontWeight: 700 }}>흡연 충동 강도</div>

  <script type="text/babel">
// screen-missions.jsx — Daily/weekly/monthly missions with XP
// Missions are split: auto-linked (CO measurement, CBT, trigger logs) vs manual (water, walk, breath)

function ScreenMissions({ onNav = () => {} }) {
  const [tab, setTab] = useState('daily');
  // CO already auto-completed from this morning's measurement
  const [doneIds, setDoneIds] = useState(new Set(['co']));
  // Tap-increment counters for self-tracked missions (water, walk)
  const [counts, setCounts] = useState({ water: 6, walk: 0 });

  const missions = {
    daily: [
      { id: 'co',     icon: 'co',    iconBg: '#EBF4FB', iconFg: '#2A6FAA', title: '아침 호기 CO 측정',  sub: '오전 9시 인증 마감',       xp: 50, auto: true,  link: 'co'      },
      { id: 'water',  icon: 'water', iconBg: '#EBF4FB', iconFg: '#5AAACE', title: '물 8잔 마시기',      target: 8, unit: '잔',                                  xp: 30                                       },
      { id: 'breath', icon: 'wind',  iconBg: '#E5F8D0', iconFg: '#3FAA48', title: '4-7-8 심호흡 1회',   sub: '약 2분 소요',              xp: 20                                       },
      { id: 'soc', icon: 'note', iconBg: '#F0E7FB', iconFg: '#6F44E2', title: '트리거 기록 + CBT 질문', sub: '충동 발생 시 자동 · 3단계 플로우', xp: 65, auto: true, link: 'trigger' },
      { id: 'walk',   icon: 'walk',  iconBg: '#FFEFC8', iconFg: '#A06A00', title: '저녁 산책 (동네 3바퀴)', target: 3, unit: '바퀴',                            xp: 35                                       },
      
    ],
    weekly: [
      { id: 'w1', icon: 'trophy', iconBg: '#FFEFC8', iconFg: '#9A6A00', title: 'CO 7일 연속 측정',     sub: '5 / 7 일',  xp: 200, prog: 5/7,  auto: true, link: 'co'      },
      { id: 'w2', icon: 'leaf',   iconBg: '#E5F8D0', iconFg: '#3FAA48', title: '주 3회 산책',          sub: '2 / 3 회',  xp: 150, prog: 2/3                                  },
      { id: 'w3', icon: 'note',   iconBg: '#F0E7FB', iconFg: '#6F44E2', title: '주 2회 CBT 세션 완료', sub: '1 / 2 회',  xp: 250, prog: 0.5, auto: true, link: 'trigger' },
    ],
    monthly: [
      { id: 'm1', icon: 'crown',  iconBg: '#FFEFC8', iconFg: '#9A6A00', title: '7일 연속 금연 인증',    sub: '5 / 7 일',   xp: 1000, prog: 5/7, auto: true, link: 'cal'     },
      { id: 'm2', icon: 'gift',   iconBg: '#FFE6E1', iconFg: '#E65A4A', title: '금연방 친구 3명 응원',  sub: '친구 응원 시 자동 기록',   xp: 400,  prog: 1/3, auto: true, link: 'home'   },
    ],
  };

  // Enrich daily list with live counters so sub/prog reflect current taps
  const enrichList = (rawList) => rawList.map(m => {
    if (m.target != null && counts[m.id] != null) {
      const cur = counts[m.id];
      return { ...m, _current: cur, sub: `${cur} / ${m.target} ${m.unit}`, prog: cur / m.target };
    }
    return m;
  });

  const list = enrichList(missions[tab]);
  const totalXP = list.filter(m => doneIds.has(m.id)).reduce((s,m) => s + m.xp, 0);

  const complete = (m) => {
    if (m.auto) {
      if (m.link) onNav(m.link);
      return;
    }
    // Incrementable tracked mission
    if (m.target != null && counts[m.id] != null) {
      const cur = counts[m.id];
      if (cur >= m.target) return;
      const next = cur + 1;
      setCounts(c => ({ ...c, [m.id]: next }));
      if (next >= m.target) {
        setDoneIds(prev => { const n = new Set(prev); n.add(m.id); return n; });
      }
      return;
    }
    // Binary toggle
    setDoneIds(prev => {
      const next = new Set(prev);
      if (next.has(m.id)) next.delete(m.id);
      else next.add(m.id);
      return next;
    });
  };

  const autoCount   = list.filter(m => m.auto).length;
  const manualCount = list.length - autoCount;

  return (
    <div className="ps-screen" data-screen-label="04 미션">
      <div className="ps-content scroll" style={{ padding: 0 }}>
        {/* Hero */}
        <div style={{ background: 'linear-gradient(180deg, #C9F08D 0%, #F2FBE6 100%)', paddingBottom: 20, borderBottomLeftRadius: 28, borderBottomRightRadius: 28 }}>
          <StatusBar />
          <div style={{ padding: '6px 20px 0' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <h1 className="ps-h1" style={{ fontSize: 30 }}>미션</h1>
              <button style={{ width: 40, height: 40, borderRadius: 999, background: 'white', border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="filter" size={18}/></button>
            </div>

            {/* XP summary */}
            <div style={{ marginTop: 14, display: 'flex', alignItems: 'center', gap: 12, background: 'white', borderRadius: 18, padding: '14px 16px', boxShadow: 'var(--shadow-sm)' }}>
              <div style={{ width: 40, height: 40, borderRadius: 12, background: '#FFEFC8', color: '#9A6A00', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="bolt" size={20}/></div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: 'var(--ink-3)', fontWeight: 700 }}>오늘 획득 XP</div>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
                  <span style={{ fontSize: 22, fontWeight: 800, letterSpacing: '-0.02em' }}>{totalXP}</span>
                  <span style={{ fontSize: 12, color: 'var(--ink-3)', fontWeight: 700 }}>/ 250 XP</span>
                </div>
                <div className="ps-progress" style={{ marginTop: 6, height: 4 }}><div style={{ width: (totalXP/250*100) + '%', background: 'linear-gradient(90deg, #FFB930, #FF7A2E)' }}/></div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 11, color: 'var(--ink-3)', fontWeight: 700 }}>레벨</div>
                <div style={{ fontSize: 22, fontWeight: 800, color: 'var(--green-700)' }}>12</div>
              </div>
            </div>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ padding: '18px 20px 0', position: 'sticky', top: 0, background: 'white', zIndex: 2 }}>
          <div style={{ display: 'flex', background: 'var(--green-50)', borderRadius: 14, padding: 4, gap: 4 }}>
            {[{id:'daily',label:'일일'},{id:'weekly',label:'주간'},{id:'monthly',label:'월간'}].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, height: 38, border: 'none', borderRadius: 11, background: tab === t.id ? 'white' : 'transparent', color: tab === t.id ? 'var(--ink)' : 'var(--ink-3)', fontWeight: 700, fontSize: 14, boxShadow: tab === t.id ? '0 2px 6px rgba(15,42,30,.06)' : 'none', cursor: 'pointer' }}>{t.label}</button>
            ))}
          </div>

          {/* Legend */}
          <div style={{ marginTop: 10, display: 'flex', gap: 10, fontSize: 11, fontWeight: 700, color: 'var(--ink-3)' }}>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
              <span style={{ width: 14, height: 14, borderRadius: 999, background: 'var(--lung-blue-50)', color: '#2A6FAA', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 9 }}>⚡</span>
              자동 연동 {autoCount}
            </span>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
              <span style={{ width: 14, height: 14, borderRadius: 999, background: 'var(--green-100)', color: 'var(--green-700)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 9 }}>✓</span>
              직접 체크 {manualCount}
            </span>
          </div>
        </div>

        {/* Mission list */}
        <div style={{ padding: '14px 20px 110px', display: 'flex', flexDirection: 'column', gap: 10 }}>
          {list.map(m => <MissionRow key={m.id} m={m} done={doneIds.has(m.id)} onAction={() => complete(m)}/>)}
        </div>
      </div>
      <TabBar active="mission" onChange={onNav}/>
    </div>
  );
}

function MissionRow({ m, done, onAction }) {
  const auto = !!m.auto;
  return (
    <div className="ps-anim-fade-up" style={{
      background: 'white',
      borderRadius: 20,
      padding: 14,
      boxShadow: 'var(--shadow-sm)',

      <div style={{ flex: 1, minWidth: 0 }}>

          {auto ? (
            <span style={{
              display: 'inline-flex', alignItems: 'center', gap: 2,
              background: 'var(--lung-blue-50)', color: '#2A6FAA',
              fontSize: 10, fontWeight: 800,
              padding: '2px 6px', borderRadius: 6,
            }}>⚡ 자동 연동</span>
          ) : null}
        </div>
        <div style={{ fontSize: 12, color: 'var(--ink-3)', marginTop: 2 }}>{m.sub}</div>
        {m.prog != null && !done ? (
          <div className="ps-progress" style={{ marginTop: 8, height: 4 }}><div style={{ width: (m.prog * 100) + '%' }}/></div>
        ) : null}
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6 }}>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 4, background: '#FFEFC8', color: '#9A6A00', padding: '4px 8px', borderRadius: 999, fontWeight: 800, fontSize: 12 }}>
          <Icon name="bolt" size={12}/>{m.xp}
        </div>

        {done ? (
          // Completed (manual or auto)
          <div className="ps-anim-pop" style={{ width: 32, height: 32, borderRadius: 999, background: 'var(--green-500)', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name="check" size={18} stroke={2.6}/>
          </div>
        ) : auto ? (
          // Auto-linked, not yet completed — tap to navigate to source flow
          <button onClick={onAction} className="ps-tap" title="진행하러 가기" style={{
            height: 32, padding: '0 12px',
            borderRadius: 999,
            background: 'var(--lung-blue-50)', color: '#2A6FAA',
            border: '1px solid #B4D5EA',
            fontSize: 11, fontWeight: 800,
            display: 'flex', alignItems: 'center', gap: 4,
          }}>
            진행 중<Icon name="chev" size={12}/>
          </button>
        ) : m.target != null ? (
          // Tap-increment manual mission — last tap shows 완료, others show +1
          (() => {
            const cur = m._current ?? 0;
            const isFinal = cur === m.target - 1;
            return (
              <button onClick={onAction} className="ps-tap" style={{
                height: 32, padding: '0 14px', borderRadius: 999,
                background: isFinal ? 'var(--ink)' : 'var(--green-100)',
                color: isFinal ? 'white' : 'var(--green-700)',
                border: 'none', fontSize: 12, fontWeight: 800,
                display: 'flex', alignItems: 'center', gap: 4,
                transition: 'all .2s',
              }}>
                {isFinal ? '완료' : `+1 ${m.unit}`}
              </button>
            );
          })()
        ) : (
          // Manual binary — user can tap 완료
          <button onClick={onAction} className="ps-tap" style={{ height: 32, padding: '0 14px', borderRadius: 999, background: 'var(--ink)', color: 'white', border: 'none', fontSize: 12, fontWeight: 800 }}>
            완료
          </button>
        )}
      </div>
    </div>
  );
}

  <script type="text/babel">
// screen-co.jsx — Interactive CO flow: idle → measuring (animated) → result; + warnings screen

function ScreenCOFlow({ onNav = () => {} }) {
  // phase: 'idle' | 'measuring' | 'result'
  const [phase, setPhase] = useState('idle');
  const [progress, setProgress] = useState(0); // 0..1
  const [coVal, setCoVal] = useState(3);

  React.useEffect(() => {
    if (phase !== 'measuring') return;
    setProgress(0);
    setCoVal(0);
    const start = performance.now();
    const dur = 5000;
    let raf;
    const tick = (t) => {
      const p = Math.min(1, (t - start) / dur);
      setProgress(p);
      const sim = 6 * Math.sin(p * Math.PI) + (p * 1.5);
      setCoVal(+(sim).toFixed(1));
      if (p < 1) {
        raf = requestAnimationFrame(tick);
      } else {
        setCoVal(3);
        setTimeout(() => setPhase('result'), 350);
      }
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [phase]);

  if (phase === 'result') return <COResult onReset={() => setPhase('idle')} onNav={onNav}/>;
  if (phase === 'measuring') return <COMeasuring progress={progress} coVal={coVal} onCancel={() => setPhase('idle')}/>;

// ── Character renderer with equipped items ──────────────────────────
function DressedCapybara({ size, equip }) {
  const color = ITEMS.color.find(c => c.id === equip.color)?.swatch || '#C8956A';
  const mood  = ITEMS.face.find(f => f.id === equip.face)?.mood || 'happy';
  const tail  = ITEMS.tail.find(t => t.id === equip.tail);
  const horn  = ITEMS.horn.find(h => h.id === equip.horn);
  const pat   = ITEMS.pattern.find(p => p.id === equip.pattern);
  const hat   = ITEMS.hat.find(h => h.id === equip.hat);
  const s = size / 200;
  return (
    <div style={{ position: 'relative', width: size, height: size * 1.05 }}>
      {tail && tail.preview ? (
        <div style={{ position: 'absolute', right: -10*s, bottom: 30*s, zIndex: 0 }}>{tail.preview(color, s)}</div>
      ) : null}
      <Capybara size={size} mood={mood} accent={color}/>
      {pat && pat.preview ? (
        <div style={{ position: 'absolute', left: 38*s, top: 82*s, width: 124*s, height: 80*s, zIndex: 1 }}>{pat.preview(color, s)}</div>
      ) : null}
      {horn && horn.preview ? (
        <div style={{ position: 'absolute', left: 100*s - 18*s, top: 2*s, zIndex: 2 }}>{horn.preview(color, s)}</div>
      ) : null}
      {hat && hat.preview ? (
        <div style={{ position: 'absolute', left: 100*s - 35*s, top: -8*s, zIndex: 3 }}>{hat.preview(color, s)}</div>
      ) : null}
    </div>
  );
}

                  { icon: 'co',    label: '아침 CO 측정', xp: 50 },
                  { icon: 'walk',  label: '저녁 산책 1,580걸음', xp: 35 },
                  { icon: 'wind',  label: '4-7-8 심호흡', xp: 20 },
                  { icon: 'note',  label: '소크라테스 Q 3개', xp: 40 },

                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>

                    <div style={{ flex: 1, fontSize: 13, fontWeight: 700 }}>{m.label}</div>

          </React.Fragment>
        )}

  );
}

function SheetStat({ label, value, unit, tone }) {
  const tones = {
    green:  { bg: 'var(--green-50)',  fg: 'var(--green-700)' },
    red:    { bg: 'var(--danger-bg)', fg: 'var(--danger)' },
    yellow: { bg: '#FFEFC8',          fg: '#9A6A00' },
    gray:   { bg: '#F0F4F1',          fg: 'var(--ink-3)' },
  }[tone];
  return (
    <div style={{ flex: 1, background: tones.bg, borderRadius: 14, padding: '10px 12px' }}>
      <div style={{ fontSize: 10, fontWeight: 800, color: tones.fg, letterSpacing: '.02em' }}>{label}</div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 2, marginTop: 4 }}>
        <span style={{ fontSize: 20, fontWeight: 800, color: 'var(--ink)', letterSpacing: '-0.02em' }}>{value}</span>
        <span style={{ fontSize: 10, fontWeight: 700, color: 'var(--ink-3)' }}>{unit}</span>
      </div>
    </div>
  );
}

function Legend({ color, label, border, dashed }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
      <div style={{ width: 12, height: 12, borderRadius: 4, background: color,
        border: border ? '2px solid var(--green-500)'
              : dashed ? '2px dashed #F2A93B'
              : color === 'transparent' ? '1.5px dashed var(--ink-4)' : 'none' }}/>
      <span>{label}</span>
    </div>
  );
}

Object.assign(window, { ScreenCalendar });

  </script>

  <script type="text/babel">
// app-mobile.jsx — Mobile app router
// Routes screens via setState. Tab bar + CTAs drive nav.
// Flow: splash → login → (first visit) onboarding → home  /  (returning) home
// Doctor login → redirects to share-doctor.html

const PS_VISITED_KEY = 'ps_visited_v1';

function MobileApp({ initialRoute = 'splash' }) {
  const [route, setRoute] = useState(initialRoute);

  const nav = (r) => {
    setRoute(r);
    setTimeout(() => {
      const el = document.querySelector('[data-screen-label] .ps-content.scroll');
      if (el) el.scrollTop = 0;
    }, 50);
  };

  const handleSplashDone = () => nav('login');

  const handlePatientLogin = () => {
    let visited = false;
    try { visited = localStorage.getItem(PS_VISITED_KEY) === '1'; } catch(_) {}
    if (visited) {
      nav('home');
    } else {
      nav('onboarding');
    }
  };

  const handleOnboardingComplete = () => {
    try { localStorage.setItem(PS_VISITED_KEY, '1'); } catch(_) {}
    nav('home');
  };

  const handleDoctorLogin = () => {
    // doctor flow lives on desktop — hop over to the dashboard view
    try { window.location.href = 'share-doctor.html'; } catch(_) {}
  };

  return (
    <div key={route} className="ps-anim-fade-up" style={{ width: '100%', height: '100%' }}>
      {route === 'splash'     && <ScreenSplash onComplete={handleSplashDone}/>}
      {route === 'login'      && <ScreenLogin onPatientLogin={handlePatientLogin} onDoctorLogin={handleDoctorLogin}/>}
      {route === 'onboarding' && <ScreenOnboarding onComplete={handleOnboardingComplete}/>}
      {route === 'home'       && <ScreenHome onNav={nav}/>}
      {route === 'mission'    && <ScreenMissions onNav={nav}/>}
      {route === 'co'         && <ScreenCOFlow onNav={nav}/>}
      {route === 'char'       && <ScreenCharacter onNav={nav}/>}
      {route === 'cal'        && <ScreenCalendar onNav={nav}/>}
      {route === 'trigger'    && <ScreenTriggerFlow onComplete={() => nav('home')}/>}
      {route === 'warnings'   && <ScreenCOWarnings onNav={nav}/>}
    </div>
  );
}

Object.assign(window, { MobileApp });

  </script>


  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const hashRoute = (typeof location !== 'undefined' && location.hash || '').replace('#','');
      const [route, setRoute] = useState(hashRoute || 'splash');

      useEffect(() => {
        const onClick = (e) => {
          const btn = e.target.closest('[data-route]');
          if (!btn) return;
          const r = btn.getAttribute('data-route');
          setRoute(r);
          document.querySelectorAll('#quick button').forEach(b => b.classList.toggle('is-active', b === btn));
          try { history.replaceState(null, '', '#' + r); } catch(_) {}
        };
        document.getElementById('quick').addEventListener('click', onClick);
        return () => document.getElementById('quick').removeEventListener('click', onClick);
      }, []);

      useEffect(() => {
        document.querySelectorAll('#quick button').forEach(b => {
          b.classList.toggle('is-active', b.getAttribute('data-route') === route);
        });
      }, [route]);

      return <MobileApp key={route} initialRoute={route}/>;
    }

    ReactDOM.createRoot(document.getElementById('screen')).render(<App/>);
  </script>
</body>
